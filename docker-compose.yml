version: '3.8'

services:
  krypton:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krypton-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Add your environment variables here
      # MONGODB_URI: mongodb://mongo:27017/krypton
      # DISCORD_TOKEN: your_token_here
    volumes:
      - ./session:/app/session
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - krypton-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7.0-alpine
    container_name: krypton-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - krypton-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:

networks:
  krypton-network:
    driver: bridge
